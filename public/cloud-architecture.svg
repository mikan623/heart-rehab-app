<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .h2 { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tag { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }

      .bg { fill: #f8fafc; }
      .aws { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2.2; rx: 16; ry: 16; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 12; ry: 12; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; rx: 10; ry: 10; }
      .frontend { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; rx: 10; ry: 10; }
      .backend { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.4; rx: 10; ry: 10; }
      .data { fill: #ecfccb; stroke: #65a30d; stroke-width: 1.4; rx: 10; ry: 10; }
      .ops { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.4; rx: 10; ry: 10; }

      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #64748b; stroke-width: 1.9; fill: none; marker-end: url(#arrowSoft); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" class="bg" />
  <text x="36" y="52" class="title">Cloud Architecture</text>

  <!-- Top row: user and delivery -->
  <rect x="40" y="96" width="220" height="88" class="zone" />
  <text x="58" y="126" class="h2">User</text>
  <text x="58" y="149" class="small">Browser / Smartphone</text>

  <rect x="340" y="96" width="220" height="88" class="zone" />
  <text x="358" y="126" class="h2">Route 53</text>
  <text x="358" y="149" class="small">DNS routing</text>

  <rect x="640" y="96" width="220" height="88" class="zone" />
  <text x="658" y="126" class="h2">ALB</text>
  <text x="658" y="149" class="small">public ingress</text>

  <rect x="940" y="96" width="220" height="88" class="zone" />
  <text x="958" y="126" class="h2">ACM</text>
  <text x="958" y="149" class="small">TLS certificate</text>
  <text x="958" y="166" class="small">infra-managed</text>

  <!-- AWS body -->
  <rect x="40" y="220" width="1320" height="620" class="aws" />
  <text x="62" y="252" class="h2">AWS Cloud</text>

  <!-- CI/CD zone -->
  <rect x="70" y="286" width="360" height="230" class="zone" />
  <text x="88" y="316" class="h2">CI/CD</text>
  <rect x="90" y="336" width="150" height="66" class="ops" />
  <text x="132" y="365" class="label">GitHub</text>
  <rect x="260" y="336" width="150" height="66" class="ops" />
  <text x="278" y="365" class="label">GitHub Actions</text>
  <rect x="175" y="426" width="150" height="66" class="ops" />
  <text x="212" y="455" class="label">Amazon ECR</text>
  <text x="202" y="474" class="small">container image</text>

  <!-- VPC zone -->
  <rect x="470" y="286" width="860" height="520" class="zone" />
  <text x="488" y="316" class="h2">VPC (ECS Fargate)</text>

  <rect x="520" y="350" width="360" height="190" class="zone" />
  <text x="538" y="380" class="h2">Application</text>
  <rect x="540" y="410" width="150" height="96" class="frontend" />
  <text x="560" y="442" class="label">Frontend</text>
  <text x="579" y="462" class="small">Next.js</text>
  <rect x="710" y="410" width="150" height="96" class="backend" />
  <text x="734" y="442" class="label">Backend API</text>
  <text x="748" y="462" class="small">Next.js Route</text>

  <rect x="930" y="350" width="360" height="190" class="zone" />
  <text x="948" y="380" class="h2">Data / Secrets</text>
  <rect x="950" y="410" width="150" height="56" class="data" />
  <text x="996" y="444" class="label">Amazon RDS</text>
  <rect x="1120" y="410" width="150" height="56" class="data" />
  <text x="1131" y="444" class="label">Secrets Manager</text>
  <rect x="950" y="478" width="150" height="56" class="data" />
  <text x="1000" y="512" class="label">AWS SES</text>

  <rect x="520" y="576" width="770" height="184" class="zone" />
  <text x="538" y="606" class="h2">External Integrations</text>
  <rect x="540" y="636" width="210" height="90" class="node" />
  <text x="616" y="670" class="label">LINE API</text>
  <text x="587" y="690" class="small">LIFF / Messaging</text>
  <rect x="780" y="636" width="210" height="90" class="node" />
  <text x="846" y="670" class="label">OpenAI API</text>
  <text x="851" y="690" class="small">gpt-4o-mini</text>
  <rect x="1020" y="636" width="210" height="90" class="node" />
  <text x="1042" y="670" class="label">Password Reset Email</text>
  <text x="1088" y="690" class="small">(SES)</text>

  <!-- Main traffic flow (top) -->
  <path d="M260 140 L340 140" class="line" />
  <path d="M560 140 L640 140" class="line" />
  <path d="M860 140 L940 140" class="line-soft dashed" />
  <path d="M750 184 L750 350" class="line" />
  <text x="682" y="274" class="tag">HTTPS</text>

  <!-- App internal -->
  <path d="M690 458 L710 458" class="line" />
  <path d="M785 506 L785 576" class="line-soft" />

  <!-- API dependencies -->
  <path d="M860 442 L950 438" class="line" />
  <path d="M860 458 L930 458 L930 388 L1120 388 L1120 438" class="line-soft" />
  <path d="M860 482 L950 506" class="line-soft" />

  <!-- API to external -->
  <path d="M785 576 L645 636" class="line" />
  <path d="M805 576 L885 636" class="line" />
  <path d="M825 576 L1125 636" class="line-soft" />

  <!-- CI/CD flow -->
  <path d="M240 369 L260 369" class="line-soft" />
  <path d="M335 402 L250 426" class="line-soft" />
  <path d="M325 459 L520 398" class="line" />
  <text x="328" y="387" class="tag">build &amp; push</text>
  <text x="336" y="438" class="tag">deploy</text>
</svg>
